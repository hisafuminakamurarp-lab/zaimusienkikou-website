<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>送信完了｜えんむすび</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--navy:#1B2B4B;--gold:#C49A3C;--beige:#F7F4EE;--cream:#FAFAF8;--white:#FFFFFF;--mid:#4A5568;--border:rgba(27,43,75,0.1);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--cream);color:var(--navy);line-height:1.7;min-height:100vh;display:flex;flex-direction:column;}
nav{background:#FAFAF8;border-bottom:1px solid var(--border);height:56px;padding:0 5%;display:flex;align-items:center;}
.logo{font-family:'Noto Serif JP',serif;font-size:1.05rem;font-weight:600;color:var(--navy);text-decoration:none;letter-spacing:0.06em;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:60px 5%;}
.thanks-box{text-align:center;max-width:520px;}
.thanks-icon{font-size:3rem;margin-bottom:1.5rem;}
.thanks-title{font-family:'Noto Serif JP',serif;font-size:1.8rem;font-weight:700;color:var(--navy);margin-bottom:1rem;}
.thanks-text{font-size:0.92rem;color:var(--mid);line-height:1.9;margin-bottom:2rem;}
.btn-home{display:inline-block;background:var(--navy);color:var(--white);padding:14px 32px;border-radius:4px;font-size:0.9rem;font-weight:500;text-decoration:none;letter-spacing:0.05em;transition:background .2s;}
.btn-home:hover{background:#263754;}
footer{background:#0E1824;padding:1.5rem 5%;text-align:center;font-size:0.76rem;color:rgba(255,255,255,0.22);}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">一般社団法人 中小企業財務支援機構</a>
</nav>
<main>
  <div class="thanks-box">
    <div class="thanks-icon">✅</div>
    <h1 class="thanks-title">送信が完了しました</h1>
    <p class="thanks-text">
      お問い合わせいただきありがとうございます。<br>
      内容を確認のうえ、2営業日以内にご連絡いたします。<br>
      しばらくお待ちください。
    </p>
    <a href="index.html" class="btn-home">トップページに戻る</a>
  </div>
</main>
<footer>© 2026 一般社団法人 中小企業財務支援機構 All Rights Reserved.</footer>
</body>
</html>
